<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&family=Inter&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body { margin: 0; }
        .slide-container {
            width: 1280px;
            min-height: 720px;
            background: #0A192F;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
            position: relative;
            color: #8892B0;
            overflow: hidden;
        }
        .glow-effect {
            position: absolute;
            top: -100px;
            right: -100px;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(100, 255, 218, 0.1) 0%, transparent 70%);
        }
        .content-box {
            text-align: center;
            max-width: 1000px;
            z-index: 1;
        }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 64px;
            color: #64FFDA;
            margin-bottom: 20px;
            line-height: 1.1;
        }
        .subtitle {
            font-size: 32px;
            color: #CCD6F6;
            font-weight: bold;
            margin-bottom: 50px;
        }
        .feature-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }
        .feature-card {
            background: #112240;
            padding: 24px;
            border: 1px solid rgba(100, 255, 218, 0.2);
            width: 280px;
            text-align: left;
        }
        .feature-card i {
            font-size: 32px;
            color: #64FFDA;
            margin-bottom: 15px;
        }
        .feature-card p {
            font-size: 18px;
            line-height: 1.4;
            color: #8892B0;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="glow-effect"></div>
        <div class="content-box">
            <h1>Mestre da Inteligência Artificial</h1>
            <div class="subtitle">A Grande Revolução Financeira de 2024</div>
            <div class="feature-grid">
                <div class="feature-card">
                    <i class="fas fa-brain"></i>
                    <p>A IA está criando uma nova classe de lucros digitais.</p>
                </div>
                <div class="feature-card">
                    <i class="fas fa-chart-line"></i>
                    <p>Enquanto muitos têm medo, outros estão lucrando alto.</p>
                </div>
                <div class="feature-card">
                    <i class="fas fa-robot"></i>
                    <p>O mercado busca quem sabe dominar estas ferramentas.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
